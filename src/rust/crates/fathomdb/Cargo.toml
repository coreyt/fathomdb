[package]
name = "fathomdb"
description = "FathomDB facade crate — re-exports the public Rust surface of fathomdb-engine."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
fathomdb-engine.workspace = true

[features]
default = []
# RED baseline: the cfg name is declared so the method-absence doctests'
# `#[cfg(not(feature = "operator"))]` is a known cfg. GREEN re-points this to
# `["fathomdb-engine/operator"]` to forward the gate into the engine.
operator = []
