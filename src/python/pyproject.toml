[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "fathomdb"
version = "0.6.1"
description = "FathomDB Python SDK — PyO3 binding to the fathomdb-engine Rust core"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8", "hypothesis>=6"]
lint = ["ruff>=0.6"]
typecheck = ["pyright>=1.1.380"]
dev = ["pytest>=8", "hypothesis>=6", "ruff>=0.6", "pyright>=1.1.380"]

[tool.maturin]
manifest-path = "../rust/crates/fathomdb-py/Cargo.toml"
module-name = "fathomdb._fathomdb"
python-source = "."
# EU-6: `default-embedder` is enabled for the editable/dev wheels so the
# `use_default_embedder=True` kwarg materialises a real bge-small
# embedder against pytest. Production wheel features are owned by the
# release workflow (`.github/workflows/release.yml`) and intentionally
# keep both no-feature and with-feature builds in the per-platform
# size-gate matrix per ADR-0.6.0-default-embedder.md EMB-3.
features = ["pyo3/extension-module", "test-hooks", "default-embedder"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pyright]
include = ["fathomdb", "tests"]
typeCheckingMode = "standard"
pythonVersion = "3.10"
venvPath = "../.."
venv = ".venv"
