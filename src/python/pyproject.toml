[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "fathomdb"
version = "0.6.0"
description = "Python scaffold for the FathomDB 0.6.0 rewrite"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8", "hypothesis>=6"]
lint = ["ruff>=0.6"]
typecheck = ["pyright>=1.1.380"]
dev = ["pytest>=8", "hypothesis>=6", "ruff>=0.6", "pyright>=1.1.380"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pyright]
include = ["fathomdb", "tests"]
typeCheckingMode = "standard"
pythonVersion = "3.10"
venvPath = "../.."
venv = ".venv"

[tool.setuptools]
package-dir = { "" = "." }

[tool.setuptools.packages.find]
where = ["."]
include = ["fathomdb*"]
