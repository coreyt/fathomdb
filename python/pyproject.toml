[build-system]
requires = ["maturin>=1.8,<2"]
build-backend = "maturin"

[project]
name = "fathomdb"
version = "0.2.0"
description = "Python bindings for fathomdb"
requires-python = ">=3.10"

[tool.maturin]
manifest-path = "../crates/fathomdb/Cargo.toml"
module-name = "fathomdb._fathomdb"
python-source = "."
features = ["python", "sqlite-vec", "tracing"]

[tool.ruff.lint]
select = ["D"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["D"]
"**/tests/**" = ["D"]
"**/test_*.py" = ["D"]
