[build-system]
requires = ["maturin>=1.8,<2"]
build-backend = "maturin"

[project]
name = "fathomdb"
version = "0.1.0"
description = "Python bindings for fathomdb"
requires-python = ">=3.11"

[tool.maturin]
manifest-path = "../crates/fathomdb/Cargo.toml"
module-name = "fathomdb._fathomdb"
python-source = "."
features = ["python", "sqlite-vec"]
