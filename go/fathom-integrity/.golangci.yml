linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - gosec
    - revive
    - wrapcheck
    - exhaustive

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
