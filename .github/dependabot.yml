version: 2
#
# Coverage reconciled 0.8.11.1 (Library Sweep #1, R-SW-5). The five entries below
# cover every SHIPPED/tracked manifest:
#   - pip  /src/python        (shipped Python package)
#   - cargo /                 (workspace root — covers all src/rust/crates/* members)
#   - npm  /src/ts            (TypeScript binding)
#   - npm  /                  (root markdown dev tooling — see R-DEP-2 note below)
#   - github-actions /        (all .github/workflows/*)
#
# Deliberately NOT covered (do NOT add — adding any of these reintroduces noise/orphans):
#   - /python  (uv-managed EVAL ENV; python/uv.lock is gitignored, not shipped). This is
#     the source of the idna/torch security-alert noise — keeping it uncovered is intentional.
#   - dev/research/**, data/corpus-data/** requirements*.txt  (eval/corpus fetch artifacts).
#   - dev/release/fixtures/cargo-skew/**  (intentional mock crates for release-skew tests).
updates:
  - package-ecosystem: "pip"
    directory: "/src/python"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/src/ts"
    schedule:
      interval: "weekly"

  # 0.8.9 R-DEP-2: the root package-lock.json (repo-wide markdown dev tooling:
  # markdownlint-cli2 + prettier) carried open advisories (markdown-it
  # GHSA-6v5v-wf23-fmfq, js-yaml GHSA-h67p-54hq-rp68) but was under NO configured
  # directory, so its security PRs never auto-opened. The "/src/ts" entry above
  # covers only the TypeScript binding, not the root manifest.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
