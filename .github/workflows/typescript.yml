name: TypeScript

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          # Route all temp files through a per-session root so cleanup is a
          # single rm -rf at job end (GH #40). Set via $GITHUB_ENV so it's
          # available to subsequent steps without using the unavailable
          # runner context at job-env level.
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - run: npm install
        working-directory: typescript
      - run: cargo build -p fathomdb --features node
      - run: npm run typecheck
        working-directory: typescript
      # sdk-harness depends on the built fathomdb package, so build before testing
      - run: npm run build
        working-directory: typescript
      - run: npm test
        working-directory: typescript
