name: CI

on:
  push:
    branches:
      - main
  pull_request:

# H-4 (pre-0.6.0 security fix): scope workflow permissions to least privilege.
# Default GITHUB_TOKEN has broader access that a compromised third-party action
# could exploit.
permissions:
  contents: read

jobs:
  # Docs-only fast-path detector. Computes whether the diff touches ANY
  # non-markdown file. A markdown/docs-only change then runs ONLY the lightweight
  # `markdownlint` job (plus the always-on `docs` mkdocs gate) and skips the heavy
  # verify / security / embedder / cross-OS / wheel jobs — so a trivial docs edit
  # no longer burns the full matrix (and a single md finding no longer reds main
  # via the heavy gate). The md gate itself is PRESERVED on the fast path; this is
  # not a `paths-ignore` drop. paths-filter handles base-ref resolution for both
  # push (before SHA) and pull_request (base branch).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # docs_only = true when NO changed file is outside markdown (i.e. every
      # changed path is *.md). `nonmd` is true when at least one non-md file
      # changed; docs_only is its negation. The bias is safe: a misread can only
      # make heavy jobs RUN on a docs change (slower), never SKIP on a code change.
      docs_only: ${{ steps.filter.outputs.nonmd == 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            nonmd:
              - '!**/*.md'

  # Single agent-loop gate. Mirrors what scripts/agent-verify.sh does locally,
  # so a green CI run = `verify` is green on the same toolchain set.
  verify:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # H-5 (pre-0.6.0 security fix): pin third-party actions to commit SHAs.
      # 0.8.9 Slice 1: fetch-depth 0 so the AC-050c removal-detect gate can
      # resolve its base ref (v0.6.1 tag); the default shallow checkout has no
      # tags, which made `git diff v0.6.1..HEAD` fail (`bad revision`) once the
      # bootstrap un-mask let agent-security.sh actually reach AC-050c.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          # Per-session TMPDIR root so cleanup is one rm -rf at job end (GH #40).
          # Set via $GITHUB_ENV — runner.* context isn't available at job-env level.
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Bootstrap dev tooling
        run: bash scripts/bootstrap.sh
      - name: agent-verify (lint -> typecheck -> test)
        run: bash scripts/agent-verify.sh

  # Gate (n) — agent-security battery (AC-036/037/038/050a/050c).
  #
  # 0.8.0 Slice 40 (Q3/META): the agent-verify job above already runs
  # STRICT=1 agent-security.sh, but on ubuntu-latest (24.04) AppArmor
  # restricts unprivileged user namespaces, so the AC-037 netns-deny-egress
  # fixture cannot actually create its userns there. This dedicated job pins
  # the security battery to ubuntu-22.04, which permits unprivileged userns
  # by default, so AC-037 genuinely exercises (the home of AC-037 per
  # acceptance.md). STRICT=1 promotes any toolchain blocker to a hard
  # failure — a blocker here means AC-037 did NOT run, which must fail the
  # gate rather than pass vacuously.
  security:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      # 0.8.9 Slice 1: fetch-depth 0 so AC-050c removal-detect can resolve its
      # v0.6.1 base tag (see the verify job above for the same rationale).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Bootstrap dev tooling (installs strace for AC-036/AC-037)
        run: bash scripts/bootstrap.sh
      - name: agent-security (AC-036/037/038/050a/050c)
        run: STRICT=1 bash scripts/agent-security.sh

  # EU-5c — pre-warm the BGE-small embedder weight cache (~133 MB from HF)
  # via actions/cache, then run the network-hitting EU-5b tests against the
  # warm cache. If the warm step fails (e.g. HF unreachable), the env-gate
  # `FATHOMDB_SKIP_NETWORK_TESTS=1` is exported and the gated tests skip
  # cleanly with a log line instead of failing the job. On the happy path
  # the env var stays unset and the tests run normally — fast on warm cache.
  default-embedder-tests:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # H-5: pin third-party actions to commit SHAs. Cache key is
      # runner.os + model identity + HF revision (see
      # fathomdb-embedder/src/loader.rs::HF_REVISION). Bumping the
      # revision invalidates the cache cleanly.
      - name: Restore BGE embedder weight cache
        id: bge-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/fathomdb/embedders
          key: ${{ runner.os }}-fathomdb-embedder-bge-small-en-v1.5-5c38ec7c405ec4b44b94cc5a9bb96e735b38267a
          # Future revision bumps should still benefit from partial
          # restoration (the loader will sha-verify each file and refetch
          # only mismatched ones). Without this, a SHA bump = 100% cold
          # miss (~133 MB redownload from HF).
          restore-keys: |
            ${{ runner.os }}-fathomdb-embedder-bge-small-en-v1.5-
            ${{ runner.os }}-fathomdb-embedder-
      - name: Warm BGE embedder cache (no-op on cache hit)
        id: warm
        shell: bash
        run: |
          set +e
          # Surface cache-hit outcome as a GitHub Actions notice so it
          # shows up in the run summary without log-diving. A regression
          # that breaks the cache key (silently forcing cold downloads
          # on every run) becomes visible at a glance here.
          echo "::notice title=BGE cache::hit=${{ steps.bge-cache.outputs.cache-hit }}"
          cargo run --quiet -p fathomdb-cli --features default-embedder \
            --bin fathomdb -- doctor warm-cache --json
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "warm-cache failed (rc=$rc); will skip network-hitting tests"
            echo "FATHOMDB_SKIP_NETWORK_TESTS=1" >> "$GITHUB_ENV"
          fi
          # Never fail the job on warm-cache failure — the env gate covers it.
          exit 0
      - name: Network-hitting EU-5b tests (engine)
        run: |
          cargo test -p fathomdb-engine --features default-embedder \
            --test eu5b_lockflip
      - name: Network-hitting EU-5b tests (cli warm-cache)
        run: |
          cargo test -p fathomdb-cli --features default-embedder \
            --test cli_warm_cache

  # Platform-sensitive engine code regresses on Windows/macOS often enough
  # that pre-0.6.0 carried these matrix legs. Keep them.
  rust-windows:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          # Windows resolves temp dir via TMP/TEMP, not TMPDIR.
          TMP="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMP"
          echo "TMP=$TMP" >> "$GITHUB_ENV"
          echo "TEMP=$TMP" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # 0.8.9 Slice 20 (F-9): --no-fail-fast surfaces the FULL set of Windows test
      # failures in one run rather than stopping at the first. The pyo3 link gate had
      # masked Windows test execution entirely; once it lifted, failures appear one per
      # run with a default (fail-fast) invocation. Enumerate them all so the
      # cross-platform remediation scope is known, not discovered whack-a-mole. (Aligned
      # with 0.8.9's anti-masking mandate — a first failure must not hide the rest.)
      - run: cargo test --workspace --no-fail-fast

  rust-macos:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  # EU-6 FIX-1 / ADR-0.6.0-default-embedder.md EMB-3 — wheel-size gate.
  #
  # Per `dev/design/0.7.1-EU-6-FIX-1-design.md` D2:
  #   * The SHIPPED wheel (with `default-embedder` feature ON, the
  #     surface a `pip install fathomdb` user actually consumes) is the
  #     GATED artifact. Each platform has its own `baseline_bytes`;
  #     regression > 20 MB blocks. This is the canary that matters.
  #   * The NO-FEATURE wheel is built informationally per matrix entry
  #     and recorded in the job summary so accidental dependency creep
  #     on the minimal-deps build path is still visible — but not gated.
  #
  # Matrix covers all 5 release-target platforms emitted by
  # `release.yml`'s build-python job: Linux x86_64, Linux aarch64,
  # macOS x86_64, macOS arm64, Windows x86_64. AC-FIX1-5.
  #
  # Baselines: Linux x86_64 measured on the FIX-1 GREEN commit
  # (with-feature wheel ≈ 6.16 MB; ~20% padding → 7.4 MB). Non-Linux
  # baselines are seeded at conservative numbers derived from the
  # Linux measurement; the first CI run will surface the real per-
  # platform numbers and any baseline that's too low can be bumped
  # within EMB-3's 20 MB regression budget. BASELINES TO RE-CALIBRATE
  # IN FIRST CI RUN — bump in a follow-up commit once the first run
  # emits real `::notice title=wheel-size::` values.
  wheel-size-gate:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            manylinux: "2_28"
            # Measured on FIX-1 GREEN commit (Linux x86_64, abi3 cp310):
            # no-feature ≈ 3.06 MB, with-feature ≈ 6.16 MB. Baseline
            # = with-feature + ~20% headroom so Cargo.lock churn does
            # not whip the gate; the 20 MB regression budget on top of
            # this absorbs intentional dependency bumps.
            baseline_bytes: 7400000
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            manylinux: "2_28"
            # Seeded from Linux x86_64 with ~5% padding (aarch64 wheels
            # are typically near-parity, occasionally a hair larger).
            # TO RECALIBRATE.
            baseline_bytes: 7700000
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: darwin-x64
            # Seeded from Linux x86_64 with ~5% padding (Mach-O vs ELF
            # overhead is small at this scale). TO RECALIBRATE.
            baseline_bytes: 7700000
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
            # Seeded from Linux x86_64 with ~5% padding. TO RECALIBRATE.
            baseline_bytes: 7700000
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: win32-x64
            # Seeded from Linux x86_64 with ~10% padding (PE/COFF
            # sections + MSVC runtime imports add a small overhead vs
            # ELF). TO RECALIBRATE.
            baseline_bytes: 8000000
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Use PyO3/maturin-action (same SHA as release.yml's build-python)
      # so the linux-aarch64 leg gets a working cross-toolchain via the
      # action's container. A bare `maturin build --target
      # aarch64-unknown-linux-gnu` on ubuntu-latest has no aarch64
      # sysroot/linker; the action handles that. This also harmonizes
      # the build path with release.yml.
      #
      # Build the with-feature wheel first — this is the shipped
      # artifact and the GATED build. `--features` REPLACES the
      # pyproject list, so the explicit list here is what gets built
      # regardless of what pyproject.toml carries.
      - name: Build wheel (with default-embedder feature; shipped artifact)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist-feature -i python3.11 --features pyo3/extension-module,default-embedder
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: src/python
      # No-feature wheel: informational only. Recorded to detect
      # accidental dependency creep on the minimal-deps tree.
      - name: Build wheel (no default-embedder feature; informational)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist-nofeature -i python3.11 --features pyo3/extension-module
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: src/python
      - name: Assert wheel-size gate
        shell: bash
        working-directory: src/python
        run: |
          set -euo pipefail
          BASELINE=${{ matrix.baseline_bytes }}
          BUDGET=$((20 * 1024 * 1024)) # 20 MB, per EMB-3
          FEAT=$(stat -c%s dist-feature/*.whl 2>/dev/null || stat -f%z dist-feature/*.whl)
          NOFEAT=$(stat -c%s dist-nofeature/*.whl 2>/dev/null || stat -f%z dist-nofeature/*.whl)
          DELTA=$(( FEAT - BASELINE ))
          FEATDELTA=$(( FEAT - NOFEAT ))
          echo "::notice title=wheel-size (${{ matrix.label }})::with-feature=${FEAT}B baseline=${BASELINE}B delta=${DELTA}B; no-feature=${NOFEAT}B (informational)"
          {
            echo "## Wheel-size gate (${{ matrix.label }})"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| with-feature wheel (shipped, GATED) | ${FEAT} B |"
            echo "| baseline | ${BASELINE} B |"
            echo "| delta vs baseline | ${DELTA} B |"
            echo "| budget (blocking) | ${BUDGET} B |"
            echo "| no-feature wheel | ${NOFEAT} B (informational only) |"
            echo "| with-feature delta vs no-feature | ${FEATDELTA} B (informational only) |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$DELTA" -gt "$BUDGET" ]; then
            echo "::error title=wheel-size regression::with-feature wheel grew ${DELTA} B vs baseline ${BASELINE} B (budget ${BUDGET} B)"
            exit 1
          fi

  # Docs-only fast-path md gate. Runs ONLY when the diff is markdown-only (the
  # heavy `verify` job — which runs scripts/agent-verify.sh -> agent-lint-md.sh —
  # is the md gate on every non-docs diff, so this avoids double-linting). Uses
  # the SAME .markdownlint-cli2.jsonc config as local + CI, so the real markdown
  # gate is preserved on the fast path (this is NOT a silent `paths-ignore` drop).
  markdownlint:
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install markdown tooling (markdownlint-cli2)
        run: npm ci
      - name: markdownlint-cli2 (repo markdown; same config as local + verify)
        run: ./node_modules/.bin/markdownlint-cli2
      - name: markdownlint docs/** (mirrors agent-lint-md.sh docs leg)
        run: bash scripts/agent-lint-docs.sh

  # mkdocs --strict is the broader CI gate beyond agent-verify (per AGENTS.md §3).
  # Intentionally NOT gated on docs_only: it must run for docs/** changes (the
  # fast path) AND alongside code changes, exactly as before.
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python3 -m pip install --upgrade pip mkdocs
      - run: mkdocs build --strict
