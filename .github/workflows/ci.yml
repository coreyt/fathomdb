name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Security fix H-4: Explicitly scope workflow permissions to least privilege.
# Without this block, GitHub Actions defaults to broader access which could be
# exploited if a third-party action is compromised.
permissions:
  contents: read

jobs:
  setup-script-test:
    runs-on: ubuntu-latest
    steps:
      # Security fix H-5: Pin all third-party actions to commit SHAs to prevent
      # tag-spoofing supply-chain attacks.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: bash scripts/test-setup-dev.sh

  docs-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: python scripts/check-doc-hygiene.py

  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      # mkdocstrings needs the native extension for runtime introspection
      - run: python -m pip install --upgrade pip maturin
      - run: python -m pip install -e python --no-build-isolation
      - run: python -m pip install -r docs/requirements-docs.txt
      - run: cd docs && mkdocs build --strict --config-file mkdocs.yml

  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --check
      # missing_docs is warn-only until existing public items are documented;
      # remove -A missing-docs once coverage is complete.
      - run: cargo clippy --workspace --all-targets -- -D warnings -A missing-docs
      - run: cargo clippy --workspace --all-targets --features tracing -- -D warnings -A missing-docs

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo nextest run --workspace

  rust-test-tracing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo nextest run --workspace --features tracing

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace

  rust-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  rust-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  go-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v1.64.8/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8
      - run: golangci-lint run ./...

  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - name: Install project-local SQLite
        working-directory: .
        run: |
          bash scripts/install-project-sqlite.sh
          . tooling/sqlite.env
          echo "$GITHUB_WORKSPACE/.local/sqlite-$SQLITE_VERSION/bin" >> "$GITHUB_PATH"
      - run: go test $(go list ./... | grep -v /test/e2e)

  go-test-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - name: Install SQLite
        run: |
          choco install sqlite -y --no-progress
          echo "C:\ProgramData\chocolatey\lib\SQLite\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: go test ./internal/... ./cmd/...

  go-test-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - name: Install project-local SQLite
        working-directory: .
        run: |
          bash scripts/install-project-sqlite.sh
          . tooling/sqlite.env
          echo "$GITHUB_WORKSPACE/.local/sqlite-$SQLITE_VERSION/bin" >> "$GITHUB_PATH"
      - run: go test $(go list ./... | grep -v /test/e2e)

  go-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: pip install maturin
      - name: Install project-local SQLite
        working-directory: .
        run: |
          bash scripts/install-project-sqlite.sh
          . tooling/sqlite.env
          echo "$GITHUB_WORKSPACE/.local/sqlite-$SQLITE_VERSION/bin" >> "$GITHUB_PATH"
      - run: go test ./test/e2e/...

  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # rustsec/audit-check creates GitHub check runs to surface advisories
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - run: npm install --ignore-scripts
      - run: npm audit --audit-level=high --omit=dev

  # Smoke test that napi prebuilds can be produced on each target platform.
  # This catches breakage in the native binding before release time.
  napi-prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build native binding
        run: cargo build --release --target ${{ matrix.target }} --features node,sqlite-vec,tracing -p fathomdb
      - name: Verify output
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            *linux*)   SRC="target/${{ matrix.target }}/release/libfathomdb.so" ;;
            *darwin*)  SRC="target/${{ matrix.target }}/release/libfathomdb.dylib" ;;
            *windows*) SRC="target/${{ matrix.target }}/release/fathomdb.dll" ;;
          esac
          ls -lh "$SRC"

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install semgrep==1.114.0
      - run: semgrep --config auto crates/ python/ typescript/ --error
