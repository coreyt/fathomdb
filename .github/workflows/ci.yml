name: CI

on:
  push:
    branches:
      - main
  pull_request:

# H-4 (pre-0.6.0 security fix): scope workflow permissions to least privilege.
# Default GITHUB_TOKEN has broader access that a compromised third-party action
# could exploit.
permissions:
  contents: read

jobs:
  # Single agent-loop gate. Mirrors what scripts/agent-verify.sh does locally,
  # so a green CI run = `verify` is green on the same toolchain set.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # H-5 (pre-0.6.0 security fix): pin third-party actions to commit SHAs.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          # Per-session TMPDIR root so cleanup is one rm -rf at job end (GH #40).
          # Set via $GITHUB_ENV — runner.* context isn't available at job-env level.
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Bootstrap dev tooling
        run: bash scripts/bootstrap.sh
      - name: agent-verify (lint -> typecheck -> test)
        run: bash scripts/agent-verify.sh

  # EU-5c — pre-warm the BGE-small embedder weight cache (~133 MB from HF)
  # via actions/cache, then run the network-hitting EU-5b tests against the
  # warm cache. If the warm step fails (e.g. HF unreachable), the env-gate
  # `FATHOMDB_SKIP_NETWORK_TESTS=1` is exported and the gated tests skip
  # cleanly with a log line instead of failing the job. On the happy path
  # the env var stays unset and the tests run normally — fast on warm cache.
  default-embedder-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # H-5: pin third-party actions to commit SHAs. Cache key is
      # runner.os + model identity + HF revision (see
      # fathomdb-embedder/src/loader.rs::HF_REVISION). Bumping the
      # revision invalidates the cache cleanly.
      - name: Restore BGE embedder weight cache
        id: bge-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/fathomdb/embedders
          key: ${{ runner.os }}-fathomdb-embedder-bge-small-en-v1.5-5c38ec7c405ec4b44b94cc5a9bb96e735b38267a
          # Future revision bumps should still benefit from partial
          # restoration (the loader will sha-verify each file and refetch
          # only mismatched ones). Without this, a SHA bump = 100% cold
          # miss (~133 MB redownload from HF).
          restore-keys: |
            ${{ runner.os }}-fathomdb-embedder-bge-small-en-v1.5-
            ${{ runner.os }}-fathomdb-embedder-
      - name: Warm BGE embedder cache (no-op on cache hit)
        id: warm
        shell: bash
        run: |
          set +e
          # Surface cache-hit outcome as a GitHub Actions notice so it
          # shows up in the run summary without log-diving. A regression
          # that breaks the cache key (silently forcing cold downloads
          # on every run) becomes visible at a glance here.
          echo "::notice title=BGE cache::hit=${{ steps.bge-cache.outputs.cache-hit }}"
          cargo run --quiet -p fathomdb-cli --features default-embedder \
            --bin fathomdb -- doctor warm-cache --json
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "warm-cache failed (rc=$rc); will skip network-hitting tests"
            echo "FATHOMDB_SKIP_NETWORK_TESTS=1" >> "$GITHUB_ENV"
          fi
          # Never fail the job on warm-cache failure — the env gate covers it.
          exit 0
      - name: Network-hitting EU-5b tests (engine)
        run: |
          cargo test -p fathomdb-engine --features default-embedder \
            --test eu5b_lockflip
      - name: Network-hitting EU-5b tests (cli warm-cache)
        run: |
          cargo test -p fathomdb-cli --features default-embedder \
            --test cli_warm_cache

  # Platform-sensitive engine code regresses on Windows/macOS often enough
  # that pre-0.6.0 carried these matrix legs. Keep them.
  rust-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          # Windows resolves temp dir via TMP/TEMP, not TMPDIR.
          TMP="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMP"
          echo "TMP=$TMP" >> "$GITHUB_ENV"
          echo "TEMP=$TMP" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  rust-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure per-session TMPDIR
        shell: bash
        run: |
          TMPDIR="$RUNNER_TEMP/fathomdb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  # EU-6 / ADR-0.6.0-default-embedder.md EMB-3 — wheel-size gate.
  #
  # Builds the Python wheel twice (no-feature and with-feature) on
  # Linux x86_64 and macOS and asserts the no-feature wheel size has
  # not regressed by more than 20 MB against the baseline. The
  # with-feature delta is RECORDED (job summary) but NOT gated: the
  # candle + tokenizers + safetensors stack is expected to grow the
  # binary substantially, and the gate's job is to flag accidental
  # bloat of the *default* (no-network-by-default) wheel.
  #
  # Linux aarch64 + Windows are TODO for a follow-up (EU-6b) — they
  # require the maturin matrix from .github/workflows/release.yml and
  # would double the CI minutes; the gate's signal-to-noise is best on
  # the two most-used targets first.
  wheel-size-gate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            # Baseline = no-feature wheel size measured on EU-6 GREEN
            # commit (Linux x86_64, abi3 cp310, ~3.06 MB; the headroom
            # in the 3.1 MB baseline absorbs small Cargo.lock churn).
            # With-feature wheel ~6.16 MB (~3.10 MB delta — candle +
            # tokenizers + safetensors stack). Update only when the
            # baseline genuinely shifts and ADR-0.6.0-default-embedder.md
            # EMB-3 is re-locked.
            baseline_bytes: 3100000
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: darwin-x64
            baseline_bytes: 3100000
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install maturin
        run: pip install maturin==1.13.1
      # Build the no-feature wheel by overriding pyproject.toml's
      # `features` list at the maturin CLI; we cannot edit the file
      # under test on every CI run. `--features` here REPLACES the
      # pyproject list.
      - name: Build wheel (no default-embedder feature)
        working-directory: src/python
        run: |
          maturin build --release --out dist-nofeature \
            --target ${{ matrix.target }} \
            -i python3.11 \
            --features pyo3/extension-module
      - name: Build wheel (with default-embedder feature)
        working-directory: src/python
        run: |
          maturin build --release --out dist-feature \
            --target ${{ matrix.target }} \
            -i python3.11 \
            --features pyo3/extension-module,default-embedder
      - name: Assert wheel-size gate
        shell: bash
        working-directory: src/python
        run: |
          set -euo pipefail
          BASELINE=${{ matrix.baseline_bytes }}
          BUDGET=$((20 * 1024 * 1024)) # 20 MB
          NOFEAT=$(stat -c%s dist-nofeature/*.whl 2>/dev/null || stat -f%z dist-nofeature/*.whl)
          FEAT=$(stat -c%s dist-feature/*.whl 2>/dev/null || stat -f%z dist-feature/*.whl)
          DELTA=$(( NOFEAT - BASELINE ))
          FEATDELTA=$(( FEAT - NOFEAT ))
          echo "::notice title=wheel-size (${{ matrix.label }})::no-feature=${NOFEAT}B baseline=${BASELINE}B delta=${DELTA}B; with-feature=${FEAT}B delta-vs-nofeature=${FEATDELTA}B"
          {
            echo "## Wheel-size gate (${{ matrix.label }})"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| no-feature wheel | ${NOFEAT} B |"
            echo "| baseline | ${BASELINE} B |"
            echo "| delta vs baseline | ${DELTA} B |"
            echo "| budget (blocking) | ${BUDGET} B |"
            echo "| with-feature wheel | ${FEAT} B |"
            echo "| with-feature delta vs no-feature | ${FEATDELTA} B (informational only) |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$DELTA" -gt "$BUDGET" ]; then
            echo "::error title=wheel-size regression::no-feature wheel grew ${DELTA} B vs baseline ${BASELINE} B (budget ${BUDGET} B)"
            exit 1
          fi

  # mkdocs --strict is the broader CI gate beyond agent-verify (per AGENTS.md §3).
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python3 -m pip install --upgrade pip mkdocs
      - run: mkdocs build --strict
