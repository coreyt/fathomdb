name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Security fix H-4: Explicitly scope workflow permissions to least privilege.
# Without this block, GitHub Actions defaults to broader access which could be
# exploited if a third-party action is compromised.
permissions:
  contents: read

jobs:
  setup-script-test:
    runs-on: ubuntu-latest
    steps:
      # Security fix H-5: Pin all third-party actions to commit SHAs to prevent
      # tag-spoofing supply-chain attacks.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: bash scripts/test-developer-setup.sh

  docs-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - run: python scripts/check-doc-hygiene.py

  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@899b013517f9e7774591216672bf75a46bb9a481 # v2.9.4
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo nextest run --workspace

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo build --workspace

  rust-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo test -p fathomdb-query -p fathomdb-schema -p fathomdb-engine

  go-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...

  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - run: go test $(go list ./... | grep -v /test/e2e)

  go-test-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - run: go test ./internal/bridge ./internal/cli

  go-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/fathom-integrity
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go/fathom-integrity/go.mod
          cache-dependency-path: go/fathom-integrity/go.mod
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - run: pip install maturin
      - run: go test ./test/e2e/...
