name: Python

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # Catches Rust-level compile/lint regressions in the Python binding code that
  # cargo clippy/test without --features python would miss.
  python-rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - run: cargo clippy --workspace --all-targets --features python -- -D warnings -A missing-docs
      # Unit tests with --features python require linking against libpython,
      # which is not available in a standalone cargo test binary. cargo check
      # validates test code compiles without linking; python-test exercises
      # the full test suite via maturin + pytest.
      - run: cargo check --tests -p fathomdb --features python

  python-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      # sccache caches individual compiler outputs — unlike rust-cache (which
      # keys on Cargo.lock and misses on any dependency change), sccache gives
      # cache hits for unchanged compilation units even when Cargo.lock changes.
      # First build seeds the cache; subsequent builds compile in ~20-30s.
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - run: python -m pip install --upgrade pip maturin pytest pytest-timeout ruff
      - run: ruff check python/
      - run: python scripts/check-version-consistency.py
      - run: python -m pip install -e python --no-build-isolation
      - run: PYTHONPATH=python pytest python/tests -v --timeout=60
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-baseline.db --mode baseline --telemetry off
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-vector.db --mode vector --telemetry off

  python-test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - run: python -m pip install --upgrade pip maturin pytest pytest-timeout
      - run: python -m pip install -e python --no-build-isolation
      - run: pytest python/tests -v --timeout=60
        env:
          PYTHONPATH: python
      - run: python -m examples.harness.app --db ${{ runner.temp }}/fathomdb-harness-baseline.db --mode baseline --telemetry off
        env:
          PYTHONPATH: python
      - run: python -m examples.harness.app --db ${{ runner.temp }}/fathomdb-harness-vector.db --mode vector --telemetry off
        env:
          PYTHONPATH: python

  python-test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - run: python -m pip install --upgrade pip maturin pytest pytest-timeout
      - run: python -m pip install -e python --no-build-isolation
      - run: PYTHONPATH=python pytest python/tests -v --timeout=60
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-baseline.db --mode baseline --telemetry off
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-vector.db --mode vector --telemetry off
