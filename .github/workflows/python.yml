name: Python

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: python -m pip install --upgrade pip maturin pytest
      - run: python scripts/check-version-consistency.py
      - run: python -m pip install -e python --no-build-isolation
      - run: PYTHONPATH=python pytest python/tests -q
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-baseline.db --mode baseline --telemetry off
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-vector.db --mode vector --telemetry off
