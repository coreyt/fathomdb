name: Python

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # Catches Rust-level compile/lint regressions in the Python binding code that
  # cargo clippy/test without --features python would miss.
  python-rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo clippy --workspace --all-targets --features python -- -D warnings
      # Unit tests with --features python require linking against libpython,
      # which is not available in a standalone cargo test binary. The clippy
      # step above catches compile/lint regressions; python-test exercises
      # the full test suite via maturin + pytest.
      - run: cargo test -p fathomdb --features python --no-run

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: python -m pip install --upgrade pip maturin pytest
      - run: python scripts/check-version-consistency.py
      - run: python -m pip install -e python --no-build-isolation
      - run: PYTHONPATH=python pytest python/tests -q
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-baseline.db --mode baseline --telemetry off
      - run: PYTHONPATH=python python -m examples.harness.app --db /tmp/fathomdb-harness-vector.db --mode vector --telemetry off
