name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: python scripts/verify-release-gates.py
        env:
          GH_TOKEN: ${{ github.token }}

  # Multi-platform Python wheels via maturin-action. Produces manylinux,
  # macOS (x86_64 + arm64), and Windows wheels for Python 3.10-3.12.
  build-python:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: PyO3/maturin-action@aef21716ff3dcae8a1c301d23ec3e4446972a6e3 # v1.49.3
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: python
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-dist-${{ matrix.target }}
          path: python/dist/*

  # Native binding prebuilds for npm. Produces one .node file per platform
  # that matches the naming convention the hand-rolled loader in
  # typescript/packages/fathomdb/src/native.ts expects.
  build-napi:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64-gnu
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: darwin-x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build native binding
        run: cargo build --release --target ${{ matrix.target }} --features node,sqlite-vec,tracing -p fathomdb
      - name: Rename and stage binary
        shell: bash
        run: |
          mkdir -p typescript/packages/fathomdb/prebuilds
          case "${{ matrix.target }}" in
            *linux*)   SRC="target/${{ matrix.target }}/release/libfathomdb.so" ;;
            *darwin*)  SRC="target/${{ matrix.target }}/release/libfathomdb.dylib" ;;
            *windows*) SRC="target/${{ matrix.target }}/release/fathomdb.dll" ;;
            *) echo "unknown target"; exit 1 ;;
          esac
          ls -lh "$SRC"
          cp "$SRC" "typescript/packages/fathomdb/prebuilds/fathomdb.${{ matrix.label }}.node"
          ls -lh typescript/packages/fathomdb/prebuilds/
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: napi-${{ matrix.label }}
          path: typescript/packages/fathomdb/prebuilds/*.node

  publish-rust:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      # Tier 1: leaf crates (no internal dependencies)
      - run: cargo publish -p fathomdb-query --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p fathomdb-schema --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io index propagation
        run: sleep 60
      # Tier 2: depends on fathomdb-query and fathomdb-schema
      - run: cargo publish -p fathomdb-engine --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io index propagation
        run: sleep 60
      # Tier 3: facade crate depends on all three
      - run: cargo publish -p fathomdb --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-python
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-napi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript/packages/fathomdb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # Pull all platform binaries into the package directory as siblings of
      # dist/. The existing loader in src/native.ts looks for
      # fathomdb.<platform>-<arch>.node relative to the compiled JS.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: napi-*
          merge-multiple: true
          path: typescript/packages/fathomdb
      - run: ls -la
      - run: npm ci
        working-directory: typescript
      - run: npm run build
      - run: npm publish --provenance --access public

  github-release:
    runs-on: ubuntu-latest
    needs:
      - build-python
      - publish-rust
      - publish-pypi
      - publish-npm
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/*
