name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: python scripts/verify-release-gates.py
        env:
          GH_TOKEN: ${{ github.token }}

  # Multi-platform Python wheels via maturin-action. Produces manylinux,
  # macOS (x86_64 + arm64), and Windows wheels for Python 3.10-3.12.
  build-python:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          # Explicit -i so cross-compile Docker containers don't pick up
          # python3.14 (pyo3 0.23 doesn't support 3.14). After the pyo3 0.28
          # upgrade in dev/notes/pyo3-0.28-upgrade-plan.md, expand this list.
          args: --release --out dist -i python3.10 python3.11 python3.12
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: python
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-dist-${{ matrix.target }}
          path: python/dist/*

  # Native binding prebuilds for npm. Produces one .node file per platform
  # that matches the naming convention the hand-rolled loader in
  # typescript/packages/fathomdb/src/native.ts expects.
  build-napi:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64-gnu
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: darwin-x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build native binding
        run: cargo build --release --target ${{ matrix.target }} --features node,sqlite-vec,tracing -p fathomdb
      - name: Rename and stage binary
        shell: bash
        run: |
          mkdir -p typescript/packages/fathomdb/prebuilds
          case "${{ matrix.target }}" in
            *linux*)   SRC="target/${{ matrix.target }}/release/libfathomdb.so" ;;
            *darwin*)  SRC="target/${{ matrix.target }}/release/libfathomdb.dylib" ;;
            *windows*) SRC="target/${{ matrix.target }}/release/fathomdb.dll" ;;
            *) echo "unknown target"; exit 1 ;;
          esac
          ls -lh "$SRC"
          cp "$SRC" "typescript/packages/fathomdb/prebuilds/fathomdb.${{ matrix.label }}.node"
          ls -lh typescript/packages/fathomdb/prebuilds/
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: napi-${{ matrix.label }}
          path: typescript/packages/fathomdb/prebuilds/*.node

  # Pre-publish packaging verification for Rust crates. Runs:
  #   1. cargo build --release --workspace — compile check of everything
  #      we're about to publish.
  #   2. cargo package --no-verify for the two leaf crates (fathomdb-query,
  #      fathomdb-schema) — validates their manifest/readme/license
  #      metadata without invoking the registry.
  #
  # The dependent crates (fathomdb-engine, fathomdb facade) are NOT packaged
  # here: cargo package rewrites path deps to versioned deps and then does
  # a registry resolve on the rewritten manifest. For a fresh release the
  # leaf crates aren't published yet, so the resolve can't find e.g.
  # fathomdb-query@0.5.1 and fails. The leaves have no internal deps and
  # package cleanly. Manifest correctness of the dependent crates is
  # enforced at actual publish time inside `cargo publish`, which is a
  # gate we don't want to duplicate at CI cost.
  build-rust:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Verify workspace builds in release mode
        run: cargo build --release --workspace
      - name: Package fathomdb-query (leaf, no internal deps)
        run: cargo package --no-verify -p fathomdb-query
      - name: Package fathomdb-schema (leaf, no internal deps)
        run: cargo package --no-verify -p fathomdb-schema

  # Cross-ecosystem gate: every build must succeed before ANY publish runs.
  # Without this, a partial release (e.g. crates.io 0.5.1 published but
  # pypi 0.5.1 blocked on a build failure) leaves downstream versioning
  # unrecoverable — 0.5.2 would then have mismatched ecosystem coverage.
  all-builds-passed:
    runs-on: ubuntu-latest
    needs:
      - verify-release
      - build-python
      - build-napi
      - build-rust
    steps:
      - run: echo "all release build gates passed"

  publish-rust:
    runs-on: ubuntu-latest
    needs: all-builds-passed
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      # Tier 1: leaf crates (no internal dependencies)
      # Note: --locked is omitted because the lock file is generated against
      # local path dependencies, which don't match the crates.io index state
      # during tiered publishing.
      - run: cargo publish -p fathomdb-query --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p fathomdb-schema --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io index propagation
        run: sleep 60
      # Tier 2: depends on fathomdb-query and fathomdb-schema
      - run: cargo publish -p fathomdb-engine --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io index propagation
        run: sleep 60
      # Tier 3: facade crate depends on all three
      - run: cargo publish -p fathomdb --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: all-builds-passed
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

  publish-npm:
    runs-on: ubuntu-latest
    needs: all-builds-passed
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript/packages/fathomdb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Pull all platform binaries into the package directory as siblings of
      # dist/. The existing loader in src/native.ts looks for
      # fathomdb.<platform>-<arch>.node relative to the compiled JS.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: napi-*
          merge-multiple: true
          path: typescript/packages/fathomdb
      - run: ls -la
      - run: npm ci
        working-directory: typescript
      - run: npm run build
      # npm OIDC trusted publishing requires npm >= 11.5.1 but Node 22
      # ships with npm 10.x. Using npx to invoke the latest npm avoids
      # the MODULE_NOT_FOUND bug from `npm install -g npm@latest` while
      # still getting a version that supports OIDC.
      - run: npx npm@latest publish --provenance --access public

  github-release:
    runs-on: ubuntu-latest
    needs:
      - publish-rust
      - publish-pypi
      - publish-npm
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/*
