name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: python scripts/verify-release-gates.py
        env:
          GH_TOKEN: ${{ github.token }}

  build-python:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: python -m pip install --upgrade pip maturin
      - working-directory: python
        run: maturin build --release --out ../dist
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-dist
          path: dist/*

  publish-rust:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      # Tier 1: leaf crates (no internal dependencies)
      - run: cargo publish -p fathomdb-query --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p fathomdb-schema --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io index propagation
        run: sleep 60
      # Tier 2: depends on fathomdb-query and fathomdb-schema
      - run: cargo publish -p fathomdb-engine --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io index propagation
        run: sleep 60
      # Tier 3: facade crate depends on all three
      - run: cargo publish -p fathomdb --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-python
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist

  github-release:
    runs-on: ubuntu-latest
    needs:
      - build-python
      - publish-rust
      - publish-pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/*
