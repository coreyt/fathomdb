[workspace]
members = [
    "crates/fathomdb",
    "crates/fathomdb-engine",
    "crates/fathomdb-query",
    "crates/fathomdb-schema",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/coreyt/fathomdb"
homepage = "https://github.com/coreyt/fathomdb"
readme = "README.md"
keywords = ["sqlite", "graph", "vector", "agent", "database"]
categories = ["database", "database-implementations"]
version = "0.5.6"

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
# Lint groups get a lower priority so individual overrides take effect
pedantic = { level = "warn", priority = -1 }
# Individual lint overrides (priority 0 beats the group)
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"
print_stdout = "warn"
print_stderr = "warn"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
must_use_candidate = "warn"
module_name_repetitions = "allow"

[workspace.dependencies]
criterion = "0.5.1"
fathomdb-engine = { path = "crates/fathomdb-engine", version = "0.5.3" }
fathomdb-query = { path = "crates/fathomdb-query", version = "0.5.3" }
fathomdb-schema = { path = "crates/fathomdb-schema", version = "0.5.3" }
napi = { version = "2.16.13", default-features = false, features = ["napi8"] }
napi-build = "2.1.5"
napi-derive = "2.16.13"
insta = { version = "1.47.2", features = ["yaml"] }
pyo3 = { version = "0.28", features = ["extension-module"] }
rstest = "0.24.0"
rusqlite = { version = "0.32.1", features = ["bundled", "load_extension", "backup"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sha2 = "0.10"
toml = "0.8"
sqlite-vec = "0.1"
tempfile = "3.19.1"
thiserror = "2.0.12"
tracing = { version = "0.1", features = ["log", "release_max_level_info"] }
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
pyo3-log = "0.13"
ulid = "1"
