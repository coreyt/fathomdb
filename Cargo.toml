[workspace]
members = [
    "crates/fathomdb",
    "crates/fathomdb-engine",
    "crates/fathomdb-query",
    "crates/fathomdb-schema",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/coreyt/fathomdb"
version = "0.1.0"

[workspace.lints.clippy]
# Lint groups get a lower priority so individual overrides take effect
pedantic = { level = "warn", priority = -1 }
# Individual lint overrides (priority 0 beats the group)
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"
print_stdout = "warn"
print_stderr = "warn"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
must_use_candidate = "warn"
module_name_repetitions = "allow"

[workspace.dependencies]
fathomdb-engine = { path = "crates/fathomdb-engine" }
fathomdb-query = { path = "crates/fathomdb-query" }
fathomdb-schema = { path = "crates/fathomdb-schema" }
insta = { version = "1.42.2", features = ["yaml"] }
rstest = "0.24.0"
rusqlite = { version = "0.32.1", features = ["bundled", "load_extension"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sha2 = "0.10"
sqlite-vec = "0.1"
tempfile = "3.19.1"
thiserror = "2.0.12"
ulid = "1"
