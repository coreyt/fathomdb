project:
  name: fathomdb
  version: 1.0.0
tools:
  clippy:
    enabled: true
    config_path: Cargo.toml
  rustfmt:
    enabled: true
    config_path: rustfmt.toml
  golangci-lint:
    enabled: true
    config_path: go/fathom-integrity/.golangci.yml
output:
  markdown:
    enabled: true
    output_dir: ./docs/guidelines
cache:
  directory: .bosun-cache
  ttl_days: 7
